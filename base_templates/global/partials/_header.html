<header class="header">
    <h1 class="header-heading">

      {% if user.is_authenticated %}
      <a href="{% url 'contact:indexUser' %}" class="header-link">

        <h2>{{user.get_full_name|title}}</h2>
         </a>
        {% else %}
       
        <a href="{% url 'contact:index' %}" class="header-link">

        <h2>Agenda Eletrônica</h2>
         </a>

        {% endif %}
      
    </h1>
    <nav class="menu">
     <ul class="menu-list">
     
      {% if user.is_authenticated %}

       <li class="menu-item">
         <a href={% url "contact:create" %} class="menu-link">Novo</a>
       </li>

       <li class="menu-item">
         <a href={% url "contact:update" %} class="menu-link">Perfil</a>
       </li>

       <li class="menu-item">
         <a href={% url "contact:logout" %} class="menu-link">Sair</a>
       </li>
        
      {% else %}

      <li class="menu-item">
          <a href={% url "contact:register" %} class="menu-link">Registrar</a>
        </li>

      <li class="menu-item">
          <a href={% url "contact:login" %} class="menu-link">Login</a>
        </li>

        {% endif %}

     </ul>
    </nav>

    {% if user.is_authenticated %}

    <div class="search">
      <form
       action={% url "contact:search" %} 
       method="get">
        <input
        type="search"
        class="search-input"
        placeholder="Search"
        id="search"
        name="q"
        value={{request.GET.q}}
        >

    </form>

    {% endif %}
    
    </div>
   </header>
